<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Moon Scorched</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* Hintergrund (Bandlogo) */
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('moon_scorched_text_1.3.JPEG') center center no-repeat;
      background-size: contain;
      opacity: 0.15;
      z-index: -1;
    }

    /* Overlay für bessere Lesbarkeit */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: -1;
    }

    /* Inhalt zentrieren */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      flex-direction: column;
      text-align: center;
    }

    /* Bandfoto */
    .band-image {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    h1 {
      margin-top: 20px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="container">
    <img src="moon-scorched_bandfoto_foto-alexander-marx.jpg.jpg" alt="Bandfoto" class="band-image">

</div>
